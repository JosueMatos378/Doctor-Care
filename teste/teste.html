  <title>Teste Whats</title>
</head>

<body>
  <form id="form">
    <div>
      <label for="fullname">Nome Completo</label>
      <input type="text" name="fullname" id="fullname" />
    </div>
    <div>
      <label for="date">Data</label>

      <label for="time-apointment">Hora</label>
      <input type="time" name="time-apointment" id="time-apointment" />
    </div>
    <button id="submit" type="submit">Agendar pelo Whatsapp</button>
  </form>

  <script src="scripts.js"></script>
</body>
